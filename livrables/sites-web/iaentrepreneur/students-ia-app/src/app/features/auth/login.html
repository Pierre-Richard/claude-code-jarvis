<div class="min-h-screen grid grid-cols-[minmax(0,0.95fr)_minmax(0,1.05fr)] bg-white">
  <div class="grad-155 text-white px-[52px] py-14 flex flex-col justify-between relative overflow-hidden">
    <div class="absolute w-[380px] h-[380px] rounded-full bg-white/10 -top-[120px] -right-[120px]"></div>
    <div class="absolute w-[260px] h-[260px] rounded-full bg-white/[.08] -bottom-20 -left-[60px]"></div>
    <div class="flex items-center gap-3 relative">
      <div class="w-[38px] h-[38px] rounded-[11px] bg-white/20 flex items-center justify-center font-extrabold text-lg">I</div>
      <span class="font-bold text-[17px] tracking-[-0.02em]">IApreneur</span>
    </div>
    <div class="relative">
      <h1 class="text-[40px] font-extrabold tracking-[-0.025em] leading-[1.12] mb-[18px]">Heureux de vous revoir.</h1>
      <p class="text-lg leading-[1.6] opacity-90 max-w-[420px]">Connectez-vous pour retrouver vos missions, vos experts et vos échanges.</p>
    </div>
    <div class="relative flex flex-col gap-[14px]">
      <div class="flex items-center gap-[11px] text-[15px]"><span class="w-6 h-6 rounded-[7px] bg-white/[.18] flex items-center justify-center"><app-icon name="check" [size]="14" /></span>Experts vérifiés et certifiés</div>
      <div class="flex items-center gap-[11px] text-[15px]"><span class="w-6 h-6 rounded-[7px] bg-white/[.18] flex items-center justify-center"><app-icon name="check" [size]="14" /></span>Matching en moins de 24 heures</div>
    </div>
  </div>

  <div class="px-16 py-14 flex flex-col justify-center">
    <div class="max-w-[420px] w-full mx-auto">
      <h2 class="text-[28px] font-extrabold tracking-[-0.02em] mb-[6px]">Se connecter</h2>
      <p class="text-[15px] text-muted mb-7">Pas encore de compte ? <a routerLink="/register" class="text-brand-indigo font-semibold cursor-pointer">Créer un compte</a></p>
      <div class="flex flex-col gap-4">
        <div><label class="lbl">E-mail</label><input class="field h-12" type="email" [value]="email()" (input)="email.set($any($event.target).value)" placeholder="vous@entreprise.com" /></div>
        <div>
          <div class="flex items-center justify-between mb-[7px]">
            <label class="text-[13px] font-semibold text-ink-soft">Mot de passe</label>
            <a class="text-[13px] text-brand-indigo font-semibold cursor-pointer">Mot de passe oublié ?</a>
          </div>
          <input class="field h-12" type="password" [value]="pass()" (input)="pass.set($any($event.target).value)" placeholder="Votre mot de passe" />
        </div>
        <button (click)="submit()" class="btn-grad h-[50px] text-base mt-[6px]">Se connecter</button>
      </div>
    </div>
  </div>
</div>
