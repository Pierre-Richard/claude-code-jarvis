<div class="h-[calc(100vh-200px)] min-h-[520px]">
  <div class="grid grid-rows-[auto_1fr] md:grid-rows-1 grid-cols-1 md:grid-cols-[300px_1fr] h-full card rounded-[18px] overflow-hidden">
    <!-- Liste conversations -->
    <div class="border-b md:border-b-0 md:border-r border-[#eef0f5] flex flex-col max-h-[38vh] md:max-h-none">
      <div class="px-5 py-[18px] border-b border-[#eef0f5] font-bold text-base">Conversations</div>
      <div class="flex-1 overflow-auto">
        @for (c of conversations(); track c.id) {
          <div (click)="select(c.id)" class="flex gap-3 px-[18px] py-[14px] cursor-pointer border-b border-[#f4f5f9]" [style.background]="activeId()===c.id ? '#f4f5fb' : 'transparent'">
            <div class="w-[42px] h-[42px] rounded-xl grad-135 flex items-center justify-center text-white font-bold text-sm flex-shrink-0">{{ c.initials }}</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between gap-2"><span class="font-semibold text-sm whitespace-nowrap overflow-hidden text-ellipsis">{{ c.name }}</span><span class="text-xs text-[#9aa3b2] flex-shrink-0">{{ c.time }}</span></div>
              <div class="flex items-center gap-[6px] mt-[3px]"><span class="text-[13px] text-muted whitespace-nowrap overflow-hidden text-ellipsis flex-1">{{ c.last }}</span>@if (c.unread) {<span class="w-[9px] h-[9px] rounded-full grad-135 flex-shrink-0"></span>}</div>
            </div>
          </div>
        }
      </div>
    </div>
    <!-- Fil -->
    <div class="flex flex-col min-w-0">
      <div class="px-6 py-[15px] border-b border-[#eef0f5] flex items-center gap-3">
        <div class="w-10 h-10 rounded-[11px] grad-135 flex items-center justify-center text-white font-bold text-sm">{{ active().initials }}</div>
        <div><div class="font-bold text-[15px]">{{ active().name }}</div><div class="text-xs text-[#16a34a]">En ligne</div></div>
      </div>
      <div class="flex-1 overflow-auto p-6 flex flex-col gap-[14px] bg-[#FAFBFC]">
        @for (m of thread(); track m.id) {
          <div class="flex" [style.justify-content]="m.mine ? 'flex-end' : 'flex-start'">
            <div class="max-w-[70%] px-[15px] pt-[11px] pb-[7px] rounded-[14px] text-sm leading-[1.5]"
                 [style.background]="m.mine ? 'linear-gradient(120deg,#6366F1,#06B6D4)' : '#fff'"
                 [style.color]="m.mine ? '#fff' : '#0A1628'"
                 [style.border]="m.mine ? 'none' : '1px solid #e7e9ef'">
              {{ m.text }}
              <span class="block text-[11px] mt-1 text-right" [style.color]="m.mine ? 'rgba(255,255,255,.7)' : '#9aa3b2'">{{ m.time }}</span>
            </div>
          </div>
        }
      </div>
      <div class="px-5 py-4 border-t border-[#eef0f5] flex items-center gap-3">
        <input [value]="draft()" (input)="draft.set($any($event.target).value)" (keydown.enter)="send()" placeholder="Écrivez votre message…" class="field flex-1 h-[46px] px-4" />
        <button (click)="send()" class="btn-grad w-[46px] h-[46px] flex-shrink-0"><app-icon name="send" [size]="19" /></button>
      </div>
    </div>
  </div>
</div>
